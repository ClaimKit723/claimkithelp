  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage:       #5e8b7e;
    --sage-deep:  #4a7265;
    --sage-mist:  #e8f2ef;
    --sage-pale:  #f2f8f6;
    --charcoal:   #2e2e2e;
    --gold:       #c9a96e;
    --gold-light: #f5ede0;
    --cream:      #fafaf8;
    --border:     #e0e0da;
    --muted:      #777;
    --white:      #fff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 32px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a { font-size: 14px; color: var(--muted); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--sage); }
  .nav-cta {
    background: var(--sage); color: var(--white) !important;
    padding: 8px 20px; border-radius: 999px; font-size: 14px !important;
    font-weight: 500; transition: background .2s !important;
  }
  .nav-cta:hover { background: var(--sage-deep) !important; color: var(--white) !important; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    padding: 120px 2rem 80px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
  }
  .hero-bg-circle1 {
    position: absolute; top: -80px; right: -80px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, #5e8b7e18 0%, transparent 70%);
  }
  .hero-bg-circle2 {
    position: absolute; bottom: 40px; left: -60px;
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, #c9a96e12 0%, transparent 70%);
  }
  .hero-inner {
    max-width: 820px; text-align: center; position: relative; z-index: 1;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--sage-mist); color: var(--sage-deep);
    padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    margin-bottom: 2rem;
    animation: fadeUp .6s ease both;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--sage); border-radius: 50%; }
  .hero-h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(42px, 7vw, 72px);
    font-weight: 400; line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--charcoal);
    margin-bottom: 1.5rem;
    animation: fadeUp .6s .1s ease both;
  }
  .hero-h1 em { font-style: italic; color: var(--sage); }
  .hero-sub {
    font-size: clamp(16px, 2vw, 19px); color: var(--muted);

    animation: fadeUp .6s .2s ease both;
  }

    animation: fadeUp .6s .3s ease both;
  }
